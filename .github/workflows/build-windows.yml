name: build-windows

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write  # needed to publish releases on tags

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: pip install ".[gui,voice,package,dev]"
      - name: Test
        run: python -m pytest -q
      - name: Build exe
        run: >
          pyinstaller --onefile --name genericMud --console
          --add-data "frontend;frontend"
          --add-data "genericmud/config/keymaps;genericmud/config/keymaps"
          --collect-all webview
          --hidden-import lupa --hidden-import websockets
          --hidden-import win32com.client --hidden-import pythoncom
          run_genericmud.py
      - uses: actions/upload-artifact@v4
        with:
          name: genericMud-windows
          path: dist/genericMud.exe
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" dist/genericMud.exe \
            --repo "$GITHUB_REPOSITORY" \
            --title "genericMud $TAG" \
            --prerelease \
            --notes "Automated build. Console app: \`genericMud.exe <host> <port> [--tls]\`. Self-voices via SAPI5; drop nvdaControllerClient.dll beside it for the NVDA voice. Early test build — soundpack audio not wired yet, Windows UI unverified." \
          || gh release upload "$TAG" dist/genericMud.exe --repo "$GITHUB_REPOSITORY" --clobber
