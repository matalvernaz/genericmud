# VIPMud-familiar keymap. The frontend sends combos like "ctrl+1", "alt+up", "f11".
# Ctrl+1-9 recall (the last nine messages) matches VIPMud. Line/word/char review on
# Alt+arrows is a genericMud enhancement — VIPMud has only the 9-message recall.
# Rebind freely after testing against NVDA on Windows.

[keys]
"ctrl+1" = "recall:1"
"ctrl+2" = "recall:2"
"ctrl+3" = "recall:3"
"ctrl+4" = "recall:4"
"ctrl+5" = "recall:5"
"ctrl+6" = "recall:6"
"ctrl+7" = "recall:7"
"ctrl+8" = "recall:8"
"ctrl+9" = "recall:9"

"alt+up" = "review:prev_line"
"alt+down" = "review:next_line"
"alt+left" = "review:prev_word"
"alt+right" = "review:next_word"
"alt+shift+left" = "review:prev_char"
"alt+shift+right" = "review:next_char"
"alt+home" = "review:top"
"alt+end" = "review:bottom"

"f11" = "voice:flush"
"escape" = "voice:flush"
"shift+f11" = "sound:flush"
"shift+f1" = "soundpack:toggle"

# Speech ergonomics (announced toggles, persisted across restarts).
# Follow mode: speech interrupts when YOU move rooms, not on every line.
# Interrupt mode: every incoming line barges in instead of queueing.
# Autoretype: Enter on an empty input resends your last command.
"ctrl+f" = "voice:follow_mode"
"ctrl+i" = "voice:interrupt_mode"
"ctrl+enter" = "input:autoretype"

# Spell the current review line (or the newest line) character by character.
"alt+shift+enter" = "review:spell_line"

# Channel browsing: cycle the channels your triggers route chat to, scroll
# within one, and recall its recent messages -- a parallel layer to the Alt
# review keys, on Ctrl+Alt.
"ctrl+alt+left" = "chan:prev"
"ctrl+alt+right" = "chan:next"
"ctrl+alt+up" = "chan:older"
"ctrl+alt+down" = "chan:newer"
"ctrl+alt+shift+left" = "chan:prev_word"
"ctrl+alt+shift+right" = "chan:next_word"
"ctrl+alt+1" = "chan:recall:1"
"ctrl+alt+2" = "chan:recall:2"
"ctrl+alt+3" = "chan:recall:3"
"ctrl+alt+4" = "chan:recall:4"
"ctrl+alt+5" = "chan:recall:5"
"ctrl+alt+6" = "chan:recall:6"
"ctrl+alt+7" = "chan:recall:7"
"ctrl+alt+8" = "chan:recall:8"
"ctrl+alt+9" = "chan:recall:9"

# Per-channel recall: "recall:<channel>:N" speaks the N-th newest line routed to
# that channel. Channels are created by triggers (mud.trigger(p, nil, {channel=...}))
# or mud.set_channel; these bind once the active soundpack defines them.
"alt+t" = "recall:tell:1"
"alt+c" = "recall:chat:1"

# Navigation. Type ".3n2e" in the command box to speedwalk (3 north, 2 east).
# alt+b drops a breadcrumb here; alt+r retraces the way back; alt+w says where you are.
"alt+b" = "nav:mark"
"alt+r" = "nav:retrace"
"alt+w" = "nav:where"
"alt+s" = "nav:stop"  # halt an in-progress safe-walk ("..3n2e")

# Logging: toggle writing this session's output + sent commands to a timestamped
# file under ~/.genericmud/logs.
"alt+shift+l" = "log:toggle"

# Diagnostics: speak the sound-path trace file location + a one-line summary (backend,
# packs/triggers loaded, cues attempted). The file always records; this just reads it out.
"alt+shift+d" = "diag:where"
